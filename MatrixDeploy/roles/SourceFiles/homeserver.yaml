#
################################################################################

# Configuration file for Synapse.
#
# This is a YAML file: see [1] for a quick introduction. Note in particular
# that *indentation is important*: all the elements of a list or dictionary
# should have the same indentation.
#
# [1] https://docs.ansible.com/ansible/latest/reference_appendices/YAMLSyntax.html
#
# For more information on how to configure Synapse, including a complete accounting of
# each option, go to docs/usage/configuration/config_documentation.md or
# https://matrix-org.github.io/synapse/latest/usage/configuration/config_documentation.html
server_name: "{{ item.fulldomain }}"
pid_file: /data/homeserver.pid
listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
#    bind_addresses: ['::1', '127.0.0.1']
    bind_addresses: ['0.0.0.0']
    resources:
      - names: [client, federation]
        compress: false
database:
  name: psycopg2
  args:
    user: synapse
    password: "{{ synapse_db_password }}"
    database: synapse
    host: "{{ item.id }}_postgres"
    cp_min: 5
    cp_max: 10
log_config: /config/log.config
media_store_path: /data/media_store
max_upload_size: "{{ plans[item.plan_type].max_upload_size }}"
media_retention:
  remote_media_lifetime: "{{ plans[item.plan_type].remote_media_lifetime }}"
signing_key_path: "/data/{{ item.id }}.signing.key"
trusted_key_servers: []
federation_domain_whitelist: []
allow_federation: false
report_stats: false
macaroon_secret_key_path: "/config/macaroon.key"

encryption_enabled_by_default_for_room_type: all

registration_shared_secret_path: "/config/registration_shared_secret"
enable_registration: false

email:
  smtp_host: "{{ smtp_server }}"
  smtp_port: "{{ smtp_port }}"
  smtp_user: "{{ smtp_username }}"
  smtp_pass: "{{ smtp_password }}"
  force_tls: true
  enable_tls: true
  require_transport_security: true
  notif_from: "{{ item.domain }} <{{ item.domain }}@{{ item.fulldomain }}>"
  sender: "{{ item.domain }} <{{ item.domain }}@{{ item.fulldomain }}>"
  enable_notifs: true
  notif_for_new_users: true
  validation_token_lifetime: 15m

retention:
  enabled: true
  default_policy:
    max_lifetime: "{{ plans[item.plan_type].remote_media_lifetime }}"

presence:
  enabled: true

{% if 'teleconferencing' in (item.addons | default([])) %}
# MatrixRTC support — required for LiveKit-backed group calls
experimental_features:
    msc3266_enabled: true
    msc4222_enabled: true
    msc4140_enabled: true

max_event_delay_duration: 24h

rc_delayed_event_mgmt:
    per_second: 1
    burst_count: 20

# Allow regular users to join MatrixRTC calls (send call membership state events)
default_power_level_content_override:
    private_chat:
        events:
            "org.matrix.msc3401.call.member": 0
            "m.call.member": 0
    trusted_private_chat:
        events:
            "org.matrix.msc3401.call.member": 0
            "m.call.member": 0
    public_chat:
        events:
            "org.matrix.msc3401.call.member": 0
            "m.call.member": 0
{% endif %}