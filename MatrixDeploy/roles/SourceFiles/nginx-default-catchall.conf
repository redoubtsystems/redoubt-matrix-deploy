# Default catch-all — rejects requests that don't match any tenant's server_name.
# Without this, Nginx routes unmatched hostnames to whichever server block it
# loads first, leaking one tenant's login page under another's domain.
# Managed by Ansible (MatrixDeploy) — do not edit manually.

server {
  listen 80 default_server;
  listen 443 ssl default_server;
  server_name _;

  ssl_certificate /etc/nginx/self-signed-default.crt;
  ssl_certificate_key /etc/nginx/self-signed-default.key;

  return 444;
}
