# ── Nginx default catch-all ─────────────────────────────────────────────────
# Ensures requests for non-existent tenant subdomains get dropped (444) instead
# of falling through to whichever tenant's server block Nginx loads first.
# Idempotent — safe to run on every provision.

- name: Generate self-signed default cert (if absent)
  command: >
    openssl req -x509 -nodes -days 3650 -newkey rsa:2048
    -keyout /etc/nginx/self-signed-default.key
    -out /etc/nginx/self-signed-default.crt
    -subj "/CN=_"
  args:
    creates: /etc/nginx/self-signed-default.crt

- name: Deploy Nginx default catch-all vhost
  copy:
    src: ../../SourceFiles/nginx-default-catchall.conf
    dest: /etc/nginx/sites-available/000-default-catchall.conf
    owner: root
    group: root
    mode: '0644'

- name: Enable Nginx default catch-all vhost
  file:
    src: /etc/nginx/sites-available/000-default-catchall.conf
    dest: /etc/nginx/sites-enabled/000-default-catchall.conf
    state: link

- name: Remove Ubuntu default Nginx vhost (conflicts with catch-all default_server)
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

# ── Tenant provisioning ───────────────────────────────────────────────────

- name: Create ReadOnly Synapse Directories for {{ item.id }}
  file:
    path: /srv/matrix/{{ item.id }}_chat/{{ dir }}
    state: directory
    owner: "{{ admin_user }}"
    group: "www-data"
    mode: '0755'
  loop:
    - config
    - logs
  loop_control:
    loop_var: dir

- name: Open Instance Specific ports
  ufw:
    rule: allow
    port: "{{ port }}"
    proto: tcp
  with_items:
    - '{{ item.admin_port }}'
  loop_control:
    loop_var: port

# ── Storage enforcement via loop device ────────────────────────────────────────
# Each tenant gets a fixed-size ext4 image file mounted at the data directory.
# Total storage = plan base (max_storage_mb) + extra_storage_gb from BillingService.
# The image is sparse (only allocates blocks on write) so initial creation is instant.

- name: Compute total storage for {{ item.id }}
  set_fact:
    total_storage_mb: "{{ (plans[item.plan_type].max_storage_mb | int) + ((item.extra_storage_gb | default(0) | int) * 1024) }}"

- name: Check if data image exists for {{ item.id }}
  stat:
    path: "/srv/matrix/{{ item.id }}_chat/{{ item.id }}_data.img"
  register: data_img_stat

# ── New image (first provision) ──────────────────────────────────────────────

- name: Create sparse data image for {{ item.id }}
  command: truncate -s {{ total_storage_mb }}M /srv/matrix/{{ item.id }}_chat/{{ item.id }}_data.img
  when: not data_img_stat.stat.exists

- name: Format data image as ext4 for {{ item.id }}
  command: mkfs.ext4 -F /srv/matrix/{{ item.id }}_chat/{{ item.id }}_data.img
  when: not data_img_stat.stat.exists

- name: Mount data image for {{ item.id }}
  mount:
    path: "/srv/matrix/{{ item.id }}_chat/data"
    src: "/srv/matrix/{{ item.id }}_chat/{{ item.id }}_data.img"
    fstype: ext4
    opts: loop
    state: mounted

# ── Resize handling (re-provision) ───────────────────────────────────────────

- name: Get current image size for {{ item.id }}
  set_fact:
    current_img_mb: "{{ (data_img_stat.stat.size | default(0) | int / 1048576) | int }}"
  when: data_img_stat.stat.exists

- name: Check disk usage on data mount for {{ item.id }}
  shell: "df --output=used -BM '/srv/matrix/{{ item.id }}_chat/data' | tail -1 | tr -dc '0-9'"
  register: storage_used_raw
  changed_when: false
  when: data_img_stat.stat.exists

- name: Set storage usage fact for {{ item.id }}
  set_fact:
    storage_used_mb: "{{ storage_used_raw.stdout | default('0') | int }}"
  when: data_img_stat.stat.exists

# -- Upgrade: grow image and expand filesystem (online, no downtime) --

- name: Grow data image for {{ item.id }}
  command: truncate -s {{ total_storage_mb }}M /srv/matrix/{{ item.id }}_chat/{{ item.id }}_data.img
  when:
    - data_img_stat.stat.exists
    - (current_img_mb | int) < (total_storage_mb | int)

- name: Expand loop device to match grown image for {{ item.id }}
  shell: "losetup -c $(losetup -j '/srv/matrix/{{ item.id }}_chat/{{ item.id }}_data.img' | cut -d: -f1)"
  when:
    - data_img_stat.stat.exists
    - (current_img_mb | int) < (total_storage_mb | int)

- name: Expand ext4 filesystem for {{ item.id }}
  command: resize2fs /srv/matrix/{{ item.id }}_chat/{{ item.id }}_data.img
  when:
    - data_img_stat.stat.exists
    - (current_img_mb | int) < (total_storage_mb | int)

# -- Downgrade: shrink if usage permits, otherwise flag over-quota --

- name: Check if downgrade is possible for {{ item.id }}
  set_fact:
    storage_shrink_blocked: "{{ (storage_used_mb | int) > (total_storage_mb | int) }}"
  when:
    - data_img_stat.stat.exists
    - (current_img_mb | int) > (total_storage_mb | int)

- name: Stop Synapse for filesystem shrink on {{ item.id }}
  command: docker stop {{ item.id }}_synapse
  when:
    - data_img_stat.stat.exists
    - (current_img_mb | int) > (total_storage_mb | int)
    - not (storage_shrink_blocked | default(false) | bool)
  ignore_errors: true

- name: Unmount data image for shrink on {{ item.id }}
  mount:
    path: "/srv/matrix/{{ item.id }}_chat/data"
    state: unmounted
  when:
    - data_img_stat.stat.exists
    - (current_img_mb | int) > (total_storage_mb | int)
    - not (storage_shrink_blocked | default(false) | bool)

- name: Check and repair filesystem before shrink on {{ item.id }}
  command: e2fsck -f -y /srv/matrix/{{ item.id }}_chat/{{ item.id }}_data.img
  when:
    - data_img_stat.stat.exists
    - (current_img_mb | int) > (total_storage_mb | int)
    - not (storage_shrink_blocked | default(false) | bool)

- name: Shrink ext4 filesystem for {{ item.id }}
  command: resize2fs /srv/matrix/{{ item.id }}_chat/{{ item.id }}_data.img {{ total_storage_mb }}M
  when:
    - data_img_stat.stat.exists
    - (current_img_mb | int) > (total_storage_mb | int)
    - not (storage_shrink_blocked | default(false) | bool)

- name: Shrink data image file for {{ item.id }}
  command: truncate -s {{ total_storage_mb }}M /srv/matrix/{{ item.id }}_chat/{{ item.id }}_data.img
  when:
    - data_img_stat.stat.exists
    - (current_img_mb | int) > (total_storage_mb | int)
    - not (storage_shrink_blocked | default(false) | bool)

- name: Remount data image after shrink for {{ item.id }}
  mount:
    path: "/srv/matrix/{{ item.id }}_chat/data"
    src: "/srv/matrix/{{ item.id }}_chat/{{ item.id }}_data.img"
    fstype: ext4
    opts: loop
    state: mounted
  when:
    - data_img_stat.stat.exists
    - (current_img_mb | int) > (total_storage_mb | int)
    - not (storage_shrink_blocked | default(false) | bool)

- name: Warn storage over-quota for {{ item.id }}
  debug:
    msg: >-
      WARNING: Tenant {{ item.id }} storage downgrade blocked.
      Requested {{ total_storage_mb }}MB but {{ storage_used_mb }}MB in use.
      Customer must reduce usage before downgrade takes effect.
  when:
    - storage_shrink_blocked | default(false) | bool

# ── End storage enforcement ──────────────────────────────────────────────────

- name: Create Writable Synapse Directories for {{ item.id }}
  file:
    path: /srv/matrix/{{ item.id }}_chat/{{ dir }}
    state: directory
    owner: 991
    group: 991
    mode: '0700'
    recurse: true
  loop:
    - data
  loop_control:
    loop_var: dir

- name: Create Postgres data directory for {{ item.id }}
  file:
    path: /srv/matrix/{{ item.id }}_chat/postgres
    state: directory
    # postgres:16-alpine's internal "postgres" user is uid/gid 70 (Alpine's
    # postgresql package convention) — NOT 999, which is the Debian-based
    # postgres image's uid. Getting this wrong doesn't fail the first
    # provision (the official entrypoint self-corrects ownership via chown
    # while initdb runs as root on an empty $PGDATA), but it silently
    # breaks every later restart/reprovision, since the entrypoint skips
    # that fixup once the data directory is already initialized.
    owner: 70
    group: 70
    mode: '0700'

- name: Create Client Directories for {{ item.id }}
  file:
    path: /srv/matrix/{{ item.id }}_chat/{{ dir }}
    state: directory
    owner: "{{ admin_user }}"
    group: www-data
    mode: '0755'
  loop:
    - client
    - admin-portal
  loop_control:
    loop_var: dir

- name: Create AdminPortal Directories for {{ item.id }}
  file:
    path: /srv/matrix/{{ item.id }}_chat/admin-portal/{{ dir }}
    state: directory
    owner: "{{ admin_user }}"
    group: www-data
    mode: '0755'
  loop:
    - scss
    - static
    - templates
  loop_control:
    loop_var: dir

- name: Create AdminPortal Directories for {{ item.id }}
  file:
    path: /srv/matrix/{{ item.id }}_chat/admin-portal/static/{{ dir }}
    state: directory
    owner: "{{ admin_user }}"
    group: www-data
    mode: '0755'
  loop:
    - css
    - img
  loop_control:
    loop_var: dir

# ── Postgres credential ───────────────────────────────────────────────────────

- name: Generate Postgres password for {{ item.id }}
  shell: "openssl rand -hex 32 > '/srv/matrix/{{ item.id }}_chat/config/db.password'"
  args:
    creates: "/srv/matrix/{{ item.id }}_chat/config/db.password"

- name: Set permissions on Postgres password for {{ item.id }}
  file:
    path: "/srv/matrix/{{ item.id }}_chat/config/db.password"
    owner: root
    group: root
    mode: '0600'

- name: Read Postgres password for {{ item.id }}
  slurp:
    src: "/srv/matrix/{{ item.id }}_chat/config/db.password"
  register: db_password_slurp
  no_log: true

- name: Set Postgres password fact for {{ item.id }}
  set_fact:
    synapse_db_password: "{{ db_password_slurp.content | b64decode | trim }}"
  no_log: true

# ── End Postgres credential ───────────────────────────────────────────────────

- name: Deploy Docker docker-compose-plugin
  template:
