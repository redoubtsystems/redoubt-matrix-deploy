# --- 1. Install Prerequisites ---
- name: Install base packages
  ansible.builtin.apt:
    name:
      - nginx
      - apache2-utils
      - python3-certbot-nginx
      - libnginx-mod-http-modsecurity
      - msmtp
      - auditd
      - logwatch 
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3
      - python3-venv
      - python3-pip
      - rsync
    state: present
    update_cache: true

# --- 2. SMTP
- name: Configure msmtp for MailTrap
  template:
    src: ../../SourceFiles/msmtp.conf.j2
    dest: /etc/msmtprc
    owner: root
    group: root
    mode: '0644'

- name: Test MailTrap SMTP connection
  shell: |
    echo "Subject: Test Email\nFrom: {{ smtp_from_address }}\n\nSMTP Test Successful." | msmtp {{ redoubt_email }}
  register: smtp_test
  ignore_errors: true

- name: Show SMTP test output
  debug:
    var: smtp_test.stdout_lines
  
# --- 4. Timezone ---
- name: Set Timezone
  timezone:
    name: "{{ server_timezone | default('UTC') }}"

# ---5. Setup Docker ---
- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become_user: root

- name: Download and dearmor Docker GPG key
  ansible.builtin.shell:
    cmd: curl -fsSL https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    creates: /etc/apt/keyrings/docker.gpg
  become_user: root

- name: Set permissions on Docker GPG key
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.gpg
    mode: '0644'
  become_user: root

- name: Add Docker Repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release | lower }} stable"
    state: present
    filename: docker
  become_user: root

- name: Install docker-ce
  apt:
    name: docker-ce
    state: latest
    update_cache: true

- name: Add admin_user to Docker group
  user:
    name: "{{ admin_user }}"
    groups: docker
    append: true
    state: present


# --- . Start/Reload Services ---
- name: Start timesyncd
  systemd:
    name: systemd-timesyncd
    state: started
    enabled: true
  ignore_errors: true

- name: Start services
  service:
    name: "{{ item }}"
    state: started
  loop:
    - auditd
    - docker
